# yaml-language-server: $schema=.causa/configuration-schema.yaml

workspace:
  name: causa

causa:
  modules:
    "@causa/workspace-core": ">= 0.28.0"
    "@causa/workspace-typescript": ">= 0.18.0"

project:
  name: runtime-typescript
  description: The package exposing the runtime SDK for Causa, focusing on service containers and event-based processing.
  language: typescript
  type: package

javascript:
  dependencies:
    check:
      allowlist: []
    update:
      packageTargets:
        # The following types should be manually updated to the next major version when the corresponding tool / package
        # is updated.
        '@types/node': minor
        '@types/express': minor
